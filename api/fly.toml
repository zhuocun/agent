app = "olune-agent-server"
primary_region = "nrt"
kill_signal = "SIGINT"
kill_timeout = "30s"

[build]

# Run DB migrations once per deploy, on a temporary release machine, BEFORE the
# new app machines roll out. Keeps `alembic upgrade head` off every machine
# boot (the Dockerfile CMD is now just uvicorn), so a cold start doesn't stall
# the first request behind a migration check against a cold cross-region DB. A
# failing migration fails the deploy instead of shipping a half-migrated app.
[deploy]
  release_command = "uv run alembic upgrade head"

[env]
  PORT = "8000"
  COOKIE_SECURE = "true"
  COOKIE_SAMESITE = "none"
  ENV = "production"
  # DeepSeek is the canonical / main provider in prod. This pins the backend;
  # the key itself stays a Fly secret (DEEPSEEK_API_KEY, or OPENAI_API_KEY as a
  # fallback) — never commit it. assert_prod_safe() refuses to boot if the key
  # is missing when PROVIDER_BACKEND=deepseek.
  PROVIDER_BACKEND = "deepseek"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  # Keep one machine warm so the FIRST visit after an idle spell doesn't cold-
  # boot a machine (+ cold DB) on the request path — the dominant cause of the
  # "page keeps loading" first-paint stall. Extra bursts still autoscale up and
  # idle ones still stop; only the floor changes from 0 to 1.
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

  [[http_service.http_checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"
    protocol = "http"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1
