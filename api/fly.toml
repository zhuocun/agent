app = "olune-agent-server"
primary_region = "nrt"
kill_signal = "SIGINT"
kill_timeout = "30s"

[build]

[env]
  PORT = "8000"
  COOKIE_SECURE = "true"
  COOKIE_SAMESITE = "none"
  ENV = "production"
  # DeepSeek is the canonical / main provider in prod. This pins the backend;
  # the key itself stays a Fly secret (DEEPSEEK_API_KEY, or OPENAI_API_KEY as a
  # fallback) — never commit it. assert_prod_safe() refuses to boot if the key
  # is missing when PROVIDER_BACKEND=deepseek.
  PROVIDER_BACKEND = "deepseek"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

  [[http_service.http_checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"
    protocol = "http"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1
