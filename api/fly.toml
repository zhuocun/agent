# Fly.io app config. App name and region are placeholders — set per env.
app = "api-placeholder"
primary_region = "iad"
kill_signal = "SIGINT"
kill_timeout = "30s"

[build]

[env]
  PORT = "8000"
  COOKIE_SECURE = "true"
  COOKIE_SAMESITE = "none"
  ENV = "production"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

  [[http_service.http_checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"
    protocol = "http"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1
