<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Olune" data-no-flip="true">
  <!-- L3 Fork — maskable safe zone (~0.67 scale, centered) so arm caps clear Android squircle masks. -->
  <style>
    .fork-stroke { stroke: #2079E8; }
    @media (prefers-color-scheme: dark) {
      .fork-stroke { stroke: #5BA0F2; }
    }
  </style>
  <g transform="translate(256 256) scale(0.67) translate(-256 -256)">
    <path
